services:
  gateway:
    image: nginx:1.27-alpine
    container_name: zenmind-gateway
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${GATEWAY_LISTEN_IP}:${GATEWAY_PORT}:80"
    volumes:
      - ./generated/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - zenmind-app-server-frontend
      - zenmind-voice-server
      - pan-webclient-frontend
      - term-webclient-frontend
      - agent-platform-runner
      - mcp-server-imagine
      - mcp-server-mock
    networks:
      - zenmind-network

  zenmind-app-server-backend:
    image: "${ZENMIND_APP_SERVER_BACKEND_IMAGE}"
    container_name: zenmind-app-server-backend
    restart: unless-stopped
    env_file:
      - ../zenmind-app-server/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../zenmind-app-server/data:/data
    networks:
      zenmind-network:
        aliases:
          - zenmind-app-server-backend

  zenmind-app-server-frontend:
    image: "${ZENMIND_APP_SERVER_FRONTEND_IMAGE}"
    container_name: zenmind-app-server-frontend
    restart: unless-stopped
    depends_on:
      - zenmind-app-server-backend
    environment:
      BACKEND_TARGET: http://zenmind-app-server-backend:8080
      STATIC_DIR: /app/dist
    ports:
      - "${APP_SERVER_FRONTEND_PORT}:80"
    networks:
      zenmind-network:
        aliases:
          - zenmind-app-server-frontend

  zenmind-voice-server:
    image: "${ZENMIND_VOICE_SERVER_IMAGE}"
    container_name: zenmind-voice-server
    restart: unless-stopped
    env_file:
      - ../zenmind-voice-server/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${VOICE_SERVER_PORT}:${VOICE_SERVER_PORT}"
    networks:
      zenmind-network:
        aliases:
          - zenmind-voice-server

  pan-webclient-api:
    image: "${PAN_WEBCLIENT_API_IMAGE}"
    container_name: pan-webclient-api
    restart: unless-stopped
    env_file:
      - path: ../pan-webclient/.env
        format: raw
    volumes:
      - ../pan-webclient/configs:/app/configs:ro
      - ../pan-webclient/data:/app/data
    networks:
      zenmind-network:
        aliases:
          - pan-webclient-api
          - api

  pan-webclient-frontend:
    image: "${PAN_WEBCLIENT_FRONTEND_IMAGE}"
    container_name: pan-webclient-frontend
    restart: unless-stopped
    depends_on:
      - pan-webclient-api
    ports:
      - "${PAN_FRONTEND_PORT}:80"
    networks:
      zenmind-network:
        aliases:
          - pan-webclient-frontend

  term-webclient-backend:
    image: "${TERM_WEBCLIENT_BACKEND_IMAGE}"
    container_name: term-webclient-backend
    restart: unless-stopped
    env_file:
      - ../term-webclient/.env
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 11937
      CONFIG_PATH: ./configs/config.docker-host.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../term-webclient/data:/app/data
      - ../term-webclient/configs:/app/configs:ro
    networks:
      zenmind-network:
        aliases:
          - term-webclient-backend

  term-webclient-frontend:
    image: "${TERM_WEBCLIENT_FRONTEND_IMAGE}"
    container_name: term-webclient-frontend
    restart: unless-stopped
    depends_on:
      - term-webclient-backend
    environment:
      HOST: 0.0.0.0
      PORT: 11947
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 11947
      BACKEND_HOST: term-webclient-backend
      BACKEND_PORT: 11937
      BACKEND_ORIGIN: http://term-webclient-backend:11937
    ports:
      - "${TERM_FRONTEND_PORT}:11947"
    networks:
      zenmind-network:
        aliases:
          - term-webclient-frontend

  agent-platform-runner:
    image: "${AGENT_PLATFORM_RUNNER_IMAGE}"
    container_name: agent-platform-runner
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ../agent-platform-runner/.env
    environment:
      SERVER_PORT: 8080
      AGENTS_DIR: /opt/agents
      TEAMS_DIR: /opt/teams
      MODELS_DIR: /opt/models
      PROVIDERS_DIR: /opt/providers
      TOOLS_DIR: /opt/tools
      MCP_SERVERS_DIR: /opt/mcp-servers
      VIEWPORT_SERVERS_DIR: /opt/viewport-servers
      VIEWPORTS_DIR: /opt/viewports
      SKILLS_MARKET_DIR: /opt/skills-market
      SCHEDULES_DIR: /opt/schedules
      CHATS_DIR: /opt/chats
      ROOT_DIR: /opt/root
      PAN_DIR: /opt/pan
    ports:
      - "${AGENT_PLATFORM_RUNNER_HOST_PORT}:8080"
    volumes:
      - ../agent-platform-runner/configs:/opt/configs:ro
      - ../.zenmind/agents:/opt/agents
      - ../.zenmind/teams:/opt/teams
      - ../.zenmind/models:/opt/models
      - ../.zenmind/providers:/opt/providers
      - ../.zenmind/tools:/opt/tools
      - ../.zenmind/mcp-servers:/opt/mcp-servers
      - ../.zenmind/viewport-servers:/opt/viewport-servers
      - ../.zenmind/viewports:/opt/viewports
      - ../.zenmind/skills-market:/opt/skills-market
      - ../.zenmind/schedules:/opt/schedules
      - ../.zenmind/chats:/opt/chats
      - ../.zenmind/root:/opt/root
      - ../.zenmind/pan:/opt/pan
    networks:
      zenmind-network:
        aliases:
          - agent-platform-runner

  mcp-server-imagine:
    image: "${MCP_SERVER_IMAGINE_IMAGE}"
    container_name: mcp-server-imagine
    restart: unless-stopped
    env_file:
      - ../mcp-server-imagine/.env
    volumes:
      - ${MCP_IMAGINE_RUNNER_DATA_ROOT}:/data
      - ../mcp-server-imagine/configs:/app/configs:ro
    networks:
      zenmind-network:
        aliases:
          - mcp-server-imagine

  mcp-server-mock:
    image: "${MCP_SERVER_MOCK_IMAGE}"
    container_name: mcp-server-mock
    restart: unless-stopped
    env_file:
      - ../mcp-server-mock/.env
    networks:
      zenmind-network:
        aliases:
          - mcp-server-mock

networks:
  zenmind-network:
    name: zenmind-network
    driver: bridge
