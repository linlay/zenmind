<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="AGW UI protocol overview">
  <defs>
    <linearGradient id="agw-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFF" />
      <stop offset="100%" stop-color="#F5FBF6" />
    </linearGradient>
    <linearGradient id="agw-main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A2FF" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <filter id="agw-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F2A44" flood-opacity="0.12" />
    </filter>
    <marker id="agw-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 Z" fill="#7EA5C2" />
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #11243A; }
      .subtitle { font: 500 17px Inter, Segoe UI, Arial, sans-serif; fill: #52677C; }
      .node-title { font: 700 19px Inter, Segoe UI, Arial, sans-serif; fill: #12263C; }
      .node-copy { font: 500 13px Inter, Segoe UI, Arial, sans-serif; fill: #5B7084; }
      .hub-title { font: 700 26px Inter, Segoe UI, Arial, sans-serif; fill: #FFFFFF; }
      .hub-copy { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #E7F6FF; }
      .chip { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #FFFFFF; letter-spacing: 0.8px; }
      .line { stroke: #7EA5C2; stroke-width: 2.5; fill: none; marker-end: url(#agw-arrow); }
      .return-line { stroke: #A67AD9; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#agw-arrow); }
    </style>
  </defs>
  <rect width="1280" height="760" rx="32" fill="url(#agw-bg)" />
  <text x="72" y="82" class="title">AGW UI Protocol</text>
  <text x="72" y="112" class="subtitle">A shared client protocol for streaming, interaction, telemetry, and sub-agent work.</text>

  <rect x="478" y="208" width="326" height="186" rx="28" fill="url(#agw-main)" filter="url(#agw-shadow)" />
  <text x="535" y="276" class="hub-title">Agent Platform</text>
  <text x="528" y="308" class="hub-copy">Run orchestration and event stream</text>
  <rect x="524" y="338" width="90" height="34" rx="17" fill="#102A43" opacity="0.92" />
  <text x="548" y="360" class="chip">AGW UI</text>
  <rect x="630" y="338" width="132" height="34" rx="17" fill="#102A43" opacity="0.92" />
  <text x="653" y="360" class="chip">EVENT MODEL</text>

  <rect x="72" y="218" width="250" height="142" rx="18" fill="#FFFFFF" filter="url(#agw-shadow)" />
  <text x="98" y="266" class="node-title">Clients</text>
  <text x="98" y="296" class="node-copy">Desktop, web, and mobile</text>
  <text x="98" y="320" class="node-copy">share one agent contract</text>

  <rect x="72" y="484" width="250" height="118" rx="18" fill="#FFFFFF" filter="url(#agw-shadow)" />
  <text x="98" y="528" class="node-title">Submit / Steer</text>
  <text x="98" y="558" class="node-copy">Continue, approve, adjust,</text>
  <text x="98" y="582" class="node-copy">or interrupt active runs</text>

  <rect x="430" y="520" width="226" height="118" rx="18" fill="#FFFFFF" filter="url(#agw-shadow)" />
  <text x="456" y="564" class="node-title">HITL + Viewport</text>
  <text x="456" y="594" class="node-copy">question, approval, form, plan</text>
  <text x="456" y="618" class="node-copy">builtin and HTML surfaces</text>

  <rect x="706" y="520" width="226" height="118" rx="18" fill="#FFFFFF" filter="url(#agw-shadow)" />
  <text x="732" y="564" class="node-title">Usage</text>
  <text x="732" y="594" class="node-copy">tokens, cache, reasoning,</text>
  <text x="732" y="618" class="node-copy">tools, and estimated cost</text>

  <rect x="1004" y="484" width="250" height="118" rx="18" fill="#FFFFFF" filter="url(#agw-shadow)" />
  <text x="1030" y="528" class="node-title">Sub-Agents</text>
  <text x="1030" y="558" class="node-copy">agent_invoke tasks stream</text>
  <text x="1030" y="582" class="node-copy">back into the main timeline</text>

  <rect x="1004" y="218" width="250" height="142" rx="18" fill="#FFFFFF" filter="url(#agw-shadow)" />
  <text x="1030" y="266" class="node-title">Resources</text>
  <text x="1030" y="296" class="node-copy">uploads, references, artifacts,</text>
  <text x="1030" y="320" class="node-copy">and resource downloads</text>

  <path class="line" d="M 322 275 C 382 255 424 246 478 252" />
  <path class="return-line" d="M 478 330 C 410 362 372 370 322 340" />
  <path class="line" d="M 206 484 C 260 430 352 382 478 344" />
  <path class="line" d="M 561 520 C 558 472 580 430 612 394" />
  <path class="return-line" d="M 706 540 C 665 486 657 435 666 394" />
  <path class="line" d="M 804 322 C 892 348 964 414 1070 484" />
  <path class="line" d="M 1004 284 C 918 276 868 276 804 284" />

  <rect x="380" y="150" width="502" height="40" rx="20" fill="#FFFFFF" stroke="#D6E6F3" stroke-width="1.5" />
  <text x="422" y="176" class="node-copy">HTTP + SSE primary path, optional WebSocket transport, same business events</text>
</svg>
